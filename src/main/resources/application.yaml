spring:
  application:
    name: poc

  datasource:
    url: jdbc:postgresql://localhost:5432/poc
    username: postgres
    password: postgres


  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true


server:
  error:
    include-message: always

jwt:
  public:
    key: ${JWT_PUBLIC_KEY:classpath:authz.pub}
  private:
    key: ${JWT_PRIVATE_KEY:classpath:authz.pem}